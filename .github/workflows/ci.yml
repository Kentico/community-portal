name: "CI: Build and Test"

on:
  pull_request:
    branches: [main]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.props"
      - "**.targets"
      - "**.sln"
      - "**.ps1"
      - "**.sql"
      - "**.config"
      - "**.yml"
      - "**.json"
      - "**.css"
      - "**.scss"
      - "**.ts"
      - "**.tsx"
      - "**.js"
      - "**.razor"
      - "**.cshtml"

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group:
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Fail if workflow takes longer than expected
    defaults:
      run:
        shell: pwsh

    env:
      ASPNETCORE_ENVIRONMENT: CI
      DATABASE_BACKUP_FILENAME: ""
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: 1
      NO_COLOR: 1
      DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: false
      PROJECT_NAME: Kentico.Community.Portal.Web
      ASPNETCORE_URLS: https://localhost:45039;https://localhost:45040
      STATUS_CHECK_URL: https://localhost:45039/status
      SQL_SA_PASSWORD: Pass@12345

    steps:
      # === Environment Setup ===
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"

      - name: Install npm dependencies
        run: pnpm install

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # === Build ===
      - name: Restore NuGet packages
        run: dotnet restore --locked-mode

      - name: Build solution
        run: |
          dotnet build `
            -c Release `
            --no-restore

      # === Database Setup ===
      - name: Get Database Backup Name
        run: |
          $latestBackup = Get-ChildItem -Path "./database" -Filter "*.zip" | Select-Object -ExpandProperty BaseName
          "DATABASE_BACKUP_FILENAME=$latestBackup" >> $env:GITHUB_ENV

      - name: Extract Database Backup
        run: |
          Expand-Archive `
            -Path "./database/${{ env.DATABASE_BACKUP_FILENAME }}.zip" `
            -DestinationPath "./database"

      - name: Install SQL Server (2022)
        uses: potatoqualitee/mssqlsuite@v1.12
        with:
          install: sqlpackage, sqlengine, sqlclient
          sa-password: ${{ env.SQL_SA_PASSWORD }}
          version: 2022

      - name: Restore Database from Backup
        run: |
          Write-Output "Creating backup directory in SQL container..."
          docker exec -u root sql bash -c "mkdir -p /var/opt/mssql/backups"

          Write-Output "Copying database backup to SQL container..."
          docker cp "./database/${{ env.DATABASE_BACKUP_FILENAME }}" sql:/var/opt/mssql/backups/Kentico.Community.bak
          docker exec -u root sql bash -c "chown mssql:mssql /var/opt/mssql/backups/Kentico.Community.bak"
          docker exec -u root sql bash -c "chmod 644 /var/opt/mssql/backups/Kentico.Community.bak"

          Write-Output "Verifying backup file contents..."
          sqlcmd `
            -S localhost `
            -d master `
            -U "sa" `
            -P "${{ env.SQL_SA_PASSWORD }}" `
            -N o `
            -C `
            -Q "RESTORE FILELISTONLY FROM DISK = '/var/opt/mssql/backups/Kentico.Community.bak'"

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to verify backup file"
            exit 1
          }

          Write-Output "Restoring database..."
          sqlcmd `
            -S localhost `
            -d master `
            -U "sa" `
            -P "${{ env.SQL_SA_PASSWORD }}" `
            -N o `
            -C `
            -i ./database/backup-restore.sql

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to restore database"
            exit 1
          }

          Write-Output "✓ Database restored successfully"
          "## ✓ Database Restored" >> $env:GITHUB_STEP_SUMMARY

      - name: Restore License Key
        working-directory: "./scripts"
        run: |
          ./Restore-LicenseKey.ps1 -LicenseKey ${{ secrets.XPERIENCE_LICENSE_KEY }}

      - name: Restore CI Repository
        working-directory: "./scripts"
        run: |
          ./Restore-CI.ps1
          "## ✓ CI Repository Restored" >> $env:GITHUB_STEP_SUMMARY

      # === Testing ===
      - name: Run Unit Tests
        working-directory: "./scripts"
        run: |
          Write-Output "## 🧪 Unit Tests" >> $env:GITHUB_STEP_SUMMARY

          $summary = ./Run-Unit-Tests.ps1 -ProjectPath "../test/Kentico.Community.Portal.Web.Tests/Kentico.Community.Portal.Web.Tests.csproj"
          $summary >> $env:GITHUB_STEP_SUMMARY

      - name: Run Integration Tests
        working-directory: "./scripts"
        run: |
          Write-Output "## 🔗 Integration Tests" >> $env:GITHUB_STEP_SUMMARY

          $summary = ./Run-Integration-Tests.ps1 -ProjectPath "../test/Kentico.Community.Portal.Web.Integration.Tests/Kentico.Community.Portal.Web.Integration.Tests.csproj"
          $summary >> $env:GITHUB_STEP_SUMMARY

      - name: Free disk space
        run: |
          Write-Output "Reclaiming disk space before E2E tests..."

          Remove-Item -Path "./database/${{ env.DATABASE_BACKUP_FILENAME }}.zip" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "./database/${{ env.DATABASE_BACKUP_FILENAME }}" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "./src/Kentico.Community.Portal.Web/node_modules" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "./src/Kentico.Community.Portal.Admin/Client/node_modules" -Recurse -Force -ErrorAction SilentlyContinue

          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize | Out-String | Write-Output
          Write-Output "✓ Disk space reclaimed"

      # === E2E Testing ===
      - name: Publish web application
        run: |
          Write-Output "Publishing application..."
          dotnet publish `
            ./src/${{ env.PROJECT_NAME }} `
            -c Release `
            -o ./publish `
            --no-build `
            --no-restore
          Write-Output "✓ Application published to ./publish"

      - name: Install Playwright dependencies
        working-directory: ./test/kentico-community-portal-web-e2e-tests
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: ./test/kentico-community-portal-web-e2e-tests
        run: |
          Write-Output "Installing Playwright browsers..."
          pnpm exec playwright install chromium
          Write-Output "✓ Playwright browsers installed"

      - name: Start Azurite storage emulator (background)
        run: |
          pnpm dlx azurite@3.35.0 -s -l ./.azurite &
          Write-Output "✓ Azurite storage emulator started"

      - name: Run E2E tests (portal)
        working-directory: ./test/kentico-community-portal-web-e2e-tests
        env:
          PORTAL_BASE_URL: https://localhost:45039
          PORTAL_MCP_URL: https://localhost:45039/mcp
          PLAYWRIGHT_WEB_SERVER_TIMEOUT_MS: 30000
          NODE_OPTIONS: --no-warnings
        run: |
          Write-Output "## 🎭 E2E Tests" >> $env:GITHUB_STEP_SUMMARY
          pnpm test --project=portal-tests
          "Playwright TypeScript portal E2E suite passed." >> $env:GITHUB_STEP_SUMMARY

      - name: Run E2E tests (admin)
        working-directory: ./test/kentico-community-portal-web-e2e-tests
        env:
          PORTAL_BASE_URL: https://localhost:45039
          PORTAL_MCP_URL: https://localhost:45039/mcp
          ADMIN_BASE_URL: https://localhost:45039/admin
          ADMIN_DEFAULT_USERNAME: administrator
          ADMIN_DEFAULT_PASSWORD: Pass@12345
          PLAYWRIGHT_WEB_SERVER_TIMEOUT_MS: 30000
          NODE_OPTIONS: --no-warnings
        run: |
          Write-Output "## 🎭 Admin E2E Tests" >> $env:GITHUB_STEP_SUMMARY
          pnpm test --project=admin-tests
          "Playwright TypeScript admin E2E suite passed." >> $env:GITHUB_STEP_SUMMARY

      # === Artifacts (on failure) ===
      - name: Upload application logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: application-logs-${{ github.run_number }}
          path: |
            publish/app-*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_number }}
          path: |
            test/kentico-community-portal-web-e2e-tests/playwright-report
            test/kentico-community-portal-web-e2e-tests/test-results
          retention-days: 1
          if-no-files-found: ignore
