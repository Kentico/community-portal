packages:
  - "src/Kentico.Community.Portal.Web"
  - "src/Kentico.Community.Portal.Admin/Client"
  - "test/kentico-community-portal-web-e2e-tests"

minimumReleaseAge: 1440
blockExoticSubdeps: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1
  - chokidar@4.0.3
allowBuilds:
  "@parcel/watcher": true

# These transitive deps are deprecated but cannot be updated directly.
# jpeg-exif + whatwg-encoding come from @amcharts/amcharts5 via pdfmake.
# uuid@8 comes from webpack-dev-server via sockjs.
# Remove entries when upstream packages no longer pull them in.
allowedDeprecatedVersions:
  jpeg-exif: "*"
  uuid: "8"
  whatwg-encoding: "*"

minimumReleaseAgeExclude:
  - shell-quote@1.8.4
  - ws@8.21.0
  - vite@8.0.16
  - launch-editor@2.14.1
  - undici@7.28.0
  - dompurify@3.4.11
  - http-proxy-middleware@2.0.10
  - "@kentico/xperience-admin-base@31.6.1"
  - "@kentico/xperience-admin-components@31.6.1"
  - '@kentico/management-api-mcp@31.6.1-preview'
  - '@kentico/xperience-webpack-config@31.6.1'
